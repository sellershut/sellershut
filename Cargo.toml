[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
license = "AGPL-3.0-only"
repository = "https://git.kanjala.com/sellershut"

[workspace.dependencies]
activitypub_federation = { version = "0.6.0-alpha", default-features = false }
anyhow = "1.0.89"
async-graphql = "7.0.9"
async-graphql-axum = "7.0.9"
async-nats = "0.37.0"
axum = "0.7.6"
axum-extra = "0.9.4"
base64 = "0.22.1"
clap = "4.5.18"
config = { version = "0.14.0", default-features = false }
futures-util = "0.3.30"
http = "1.1.0"
infra = { path = "crates/infra" }
opentelemetry = "0.26.0"
secrecy = "0.10.2"
sellershut-core = { path = "crates/sellershut-core" }
sellershut-utils = { path = "crates/sellershut-utils" }
serde = "1.0.210"
serde_json = "1.0.128"
sqlx = { version = "0.8.2", default-features = false }
prost = "0.13.3"
thiserror = "1.0.63"
time = "0.3.36"
tokio = "1.40.0"
tonic = "0.12.2"
tonic-reflection = "0.12.2"
tower = "0.5.1"
tower-http = "0.6.0"
tracing = "0.1.40"
tracing-opentelemetry = "0.27.0"
url = "2.5.2"
