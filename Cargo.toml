[workspace]
members = ["crates/*", "lib/*"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"

[workspace.dependencies]
anyhow = "1.0.95"
activitypub_federation = { version = "0.6.1", default-features = false }
axum = "0.7.9"
clap = "4.5.23"
config = { version = "0.15.4", default-features = false }
http = "1.2.0"
opentelemetry = "0.27.1"
prost = "0.13.4"
secrecy = "0.10.3"
serde = "1.0.216"
serde_json = "1.0.134"
time = "0.3.37"
tonic = "0.12.3"
sellershut-core = { path = "lib/sellershut-core" }
sellershut-utils = { path = "lib/sellershut-utils" }
svc-infra = { path = "lib/svc-infra" }
sqlx = { version = "0.8.2", default-features = false }
thiserror = "2.0.9"
tokio = "1.42.0"
tracing = "0.1.41"
tracing-opentelemetry = "0.28.0"
url = "2.5.4"
