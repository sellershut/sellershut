[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
license = "AGPL-3.0-only"
repository = "https://git.kanjala.com/sellershut"

[workspace.dependencies]
infra = { path = "crates/infra" }
sellershut-core = { path = "crates/sellershut-core" }
serde = "1.0.210"
prost = "0.13.3"
tonic = "0.12.2"
tracing = "0.1.40"
